name: Full Version Check (manual)

# Exhaustive, on-demand check that the right jar boots cleanly on EVERY Minecraft version in its
# range. A mixin-apply failure crashes the client during startup (registry/sound bootstrap, before
# the menu), which fails that version's job — so this is the safety net against the kind of
# intermediate-version mixin breaks we have hit. Manual only (workflow_dispatch): it spins up ~26
# headless clients, which is too heavy to run on every commit.
#
# Coverage note: versions are every release that HeadlessMC's mc-runtime-test publishes a test mod
# for. Patches it skips (e.g. 1.16.1-4, 1.21.2) share a jar and the same internals as a neighbouring
# tested patch, so they are covered transitively.

on:
  workflow_dispatch:

concurrency:
  group: full-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build each distributable jar once; the per-version jobs just download and run it.
  build:
    name: build ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ "1.16.5", "1.21.11", "26.1" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            17
            25
            21
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Build ${{ matrix.node }} jar
        run: ./gradlew ":${{ matrix.node }}:build" --stacktrace
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.node }}
          path: |
            versions/${{ matrix.node }}/build/libs/*.jar
            !versions/${{ matrix.node }}/build/libs/*-sources.jar
          if-no-files-found: error

  check:
    name: ${{ matrix.mc }} (${{ matrix.node }} jar)
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- legacy jar (built at 1.16.5): class-based Music, covers >=1.16 <1.21.5 ----
          - { node: "1.16.5",  mc: "1.16.5",  java: "8",  experimental: true }
          # 1.17.x pins Java 16 in its manifest and HeadlessMC can't fetch an (EOL) Temurin 16, so it
          # fails to LAUNCH (not a mod issue). The 1.17 era is covered transitively by 1.16.5/1.18.2.
          - { node: "1.16.5",  mc: "1.17.1",  java: "17", experimental: true }
          - { node: "1.16.5",  mc: "1.18.2",  java: "17" }
          - { node: "1.16.5",  mc: "1.19",    java: "17" }
          - { node: "1.16.5",  mc: "1.19.1",  java: "17" }
          - { node: "1.16.5",  mc: "1.19.2",  java: "17" }
          - { node: "1.16.5",  mc: "1.19.3",  java: "17" }
          - { node: "1.16.5",  mc: "1.19.4",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.1",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.2",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.3",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.4",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.6",  java: "21" }
          - { node: "1.16.5",  mc: "1.21",    java: "21" }
          - { node: "1.16.5",  mc: "1.21.1",  java: "21" }
          - { node: "1.16.5",  mc: "1.21.3",  java: "21" }
          - { node: "1.16.5",  mc: "1.21.4",  java: "21" }
          - { node: "1.16.5",  mc: "1.21.5",  java: "21" }
          # ---- modern jar (built at 1.21.11): record-based Music, covers >=1.21.6 ----
          - { node: "1.21.11", mc: "1.21.6",  java: "21" }
          - { node: "1.21.11", mc: "1.21.7",  java: "21" }
          - { node: "1.21.11", mc: "1.21.8",  java: "21" }
          - { node: "1.21.11", mc: "1.21.10", java: "21" }
          - { node: "1.21.11", mc: "1.21.11", java: "21" }
          # ---- 26.1 jar: official (un-obfuscated) mappings ----
          - { node: "26.1",    mc: "26.1",    java: "25", experimental: true }
          - { node: "26.1",    mc: "26.1.1",  java: "25", experimental: true }
          - { node: "26.1",    mc: "26.1.2",  java: "25", experimental: true }
    # Oldest/newest versions can have headless quirks unrelated to the mod — visible but non-blocking.
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Download ${{ matrix.node }} jar into mods
        uses: actions/download-artifact@v4
        with:
          name: jar-${{ matrix.node }}
          path: run/mods

      - run: ls -la run/mods

      - name: Headless boot + world join on ${{ matrix.mc }}
        uses: headlesshq/mc-runtime-test@4.4.0
        with:
          mc: ${{ matrix.mc }}
          modloader: fabric
          java: ${{ matrix.java }}
          regex: ".*fabric.*"
          mc-runtime-test: fabric
          xvfb: true
          headlessmc-command: '--jvm "-Djava.awt.headless=true -Dkeepthatmusic.test=true"'
