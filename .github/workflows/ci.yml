name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Compile + mixin-processing + remap for every supported version.
  # This is the "does it build" gate across the whole 1.16.5 -> 26.1.2 span.
  # ---------------------------------------------------------------------------
  build:
    name: build ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ "1.16.5", "1.21.11", "26.1" ]
    steps:
      - uses: actions/checkout@v4

      # Install every JDK the version span needs (8/17/21/25). Gradle runs on 21;
      # Loom toolchains pick the right one per Minecraft version automatically.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            17
            25
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.node }}
        run: ./gradlew ":${{ matrix.node }}:build" --stacktrace

  # ---------------------------------------------------------------------------
  # Boot the real client headlessly (HeadlessMC + Xvfb): the bundled test mod
  # joins a single-player world, waits for chunks, then quits. This exercises
  # the mod's mixins at runtime (world join, the selective stop-on-disconnect,
  # and the clean shutdown) and fails the build if any mixin fails to apply —
  # exactly the class of bug that a compile-only check cannot catch.
  # ---------------------------------------------------------------------------
  runtime-test:
    name: runtime ${{ matrix.node }} jar on ${{ matrix.mc }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The single legacy (1.16.5) jar is run against one representative version from every
        # generation in its >=1.16 <1.21.2 range, so a break at any minor update is caught:
        #   1.18.2 / 1.19.4 (chat rewrite) / 1.20.1 (pre 1.20.2 networking rewrite) /
        #   1.20.3 (post rewrite) / 1.20.6 (1.20.5 Java-21 era) / 1.21.1 (top of range).
        # The modern jars are run on their own version.
        include:
          - { node: "1.16.5",  mc: "1.18.2",  java: "17" }
          - { node: "1.16.5",  mc: "1.19.4",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.1",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.3",  java: "17" }
          - { node: "1.16.5",  mc: "1.20.6",  java: "21" }
          - { node: "1.16.5",  mc: "1.21.1",  java: "21" }
          # 1.21.3-1.21.5: Music is still a regular class, so the legacy jar covers them.
          # (mc-runtime-test has no 1.21.2 mod; the neighbours are the same jar + same class-based Music.)
          - { node: "1.16.5",  mc: "1.21.3",  java: "21" }
          - { node: "1.16.5",  mc: "1.21.5",  java: "21" }
          # 1.21.6: Music became a record -> the modern jar takes over here.
          - { node: "1.21.11", mc: "1.21.6",  java: "21" }
          - { node: "1.21.11", mc: "1.21.11", java: "21" }
          # Endpoints HeadlessMC may not run headlessly cleanly — visible but non-blocking.
          - { node: "1.16.5",  mc: "1.16.5",  java: "8",  experimental: true }
          - { node: "26.1",    mc: "26.1.2",  java: "25", experimental: true }
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            17
            25
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.node }}
        run: ./gradlew ":${{ matrix.node }}:build" --stacktrace

      - name: Stage mod jar (exclude sources)
        run: |
          mkdir -p run/mods
          find "versions/${{ matrix.node }}/build/libs" -name '*.jar' ! -name '*-sources.jar' -exec cp {} run/mods \;
          ls -la run/mods

      - name: Headless client smoke test
        uses: headlesshq/mc-runtime-test@4.4.0
        with:
          mc: ${{ matrix.mc }}
          modloader: fabric
          java: ${{ matrix.java }}
          # Selects which installed profile HeadlessMC launches (the Fabric one), NOT our mod jar —
          # our jar is loaded automatically from run/mods.
          regex: ".*fabric.*"
          mc-runtime-test: fabric
          xvfb: true
          # -Dkeepthatmusic.test=true activates MixinTestDriver, which runs /playsound
          # once the test world has loaded. A crash there fails the job.
          headlessmc-command: '--jvm "-Djava.awt.headless=true -Dkeepthatmusic.test=true"'
