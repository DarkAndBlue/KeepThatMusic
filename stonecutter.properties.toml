# Centralized, per-version properties consumed by build.gradle.kts and stonecutter.gradle.kts.
# See https://stonecutter.kikugie.dev/wiki/config/properties#centralized-properties
mod.id = "keepthatmusic"
mod.name = "Keep That Music"
mod.group = "de.darkandblue.keepthatmusic"
mod.version = "1.0.1"

# Loom-back-compat picks the correct Loom variant per Minecraft version from this base.
loomx.loom_version = "1.16-SNAPSHOT"

# ---------------------------------------------------------------------------
# Per-version blocks. Each Minecraft node pins its own Fabric Loader and the
# Mod Menu build that matches that version. deps.modmenu being present enables
# the Mod Menu integration on that node (see the `modmenu` constant).
# Mod Menu coordinates: com.terraformersmc:modmenu  (maven.terraformersmc.com)
# NOTE: the exact Mod Menu builds for the newest MC versions may need bumping
# once published; pinned here to the closest known release.
# ---------------------------------------------------------------------------

# The 1.16.5 build is the single "legacy" jar: built at Java 8 with no config screen, it runs
# across the whole pre-record range (Music is a regular class with stable intermediary method names
# through 1.21.4) via version-stable intermediary mappings.
["1.16.5"]
mod.mc_compat = ">=1.16 <1.21.6"
deps.fabric_loader = "0.16.14"
deps.modmenu = "1.16.23"

# Modern line (1.21.6+): Music became a record (maxDelay, comp_* names) at 1.21.6 and
# SoundManager.pause() is gone by 1.21.11. Built at 1.21.11; the record-component intermediary names
# we use (comp_4360/comp_4361) are stable across 1.21.6–1.21.11. Has the screen.
["1.21.11"]
mod.mc_compat = ">=1.21.6 <1.22"
deps.fabric_loader = "0.17.2"
deps.modmenu = "16.0.0"
# Local-runtime only (not in the published jar): lets `runClient` open the config screen via Mod
# Menu to test the buttons in-game. Mod Menu needs Fabric API at runtime.
deps.fabric_api = "0.141.4+1.21.11"

["26.1"]
mod.mc_compat = "~26.1"
deps.fabric_loader = "0.19.2"
# 26.1 is unobfuscated: only a Mod Menu build compiled against official 26.1 mappings will work.
deps.modmenu = "18.0.0-beta.1"
deps.fabric_api = "0.152.1+26.1.2"

# 26.2 moved screen-setting from Minecraft.setScreen() to Minecraft.gui.setScreen() (see the
# //? if >=26.2 branch in KeepThatMusicConfigScreen), so it needs its own jar. Like 26.1 it is
# unobfuscated, so it needs a Mod Menu build compiled against official 26.2 mappings.
["26.2"]
mod.mc_compat = "~26.2"
deps.fabric_loader = "0.19.3"
deps.modmenu = "20.0.0-beta.3"
deps.fabric_api = "0.152.2+26.2"