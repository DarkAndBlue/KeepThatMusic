# Centralized, per-version properties consumed by build.gradle.kts and stonecutter.gradle.kts.
# See https://stonecutter.kikugie.dev/wiki/config/properties#centralized-properties
mod.id = "keepthatmusic"
mod.name = "Keep That Music"
mod.group = "de.darkandblue.keepthatmusic"
mod.version = "1.0.0"

# Loom-back-compat picks the correct Loom variant per Minecraft version from this base.
loomx.loom_version = "1.16-SNAPSHOT"

# ---------------------------------------------------------------------------
# Per-version blocks. Each Minecraft node pins its own Fabric Loader and the
# Mod Menu build that matches that version. deps.modmenu being present enables
# the Mod Menu integration on that node (see the `modmenu` constant).
# Mod Menu coordinates: com.terraformersmc:modmenu  (maven.terraformersmc.com)
# NOTE: the exact Mod Menu builds for the newest MC versions may need bumping
# once published; pinned here to the closest known release.
# ---------------------------------------------------------------------------

# The 1.16.5 build is the single "legacy" jar: built at Java 8 with no config screen, it runs
# across the whole pre-record range via version-stable intermediary mappings.
["1.16.5"]
mod.mc_compat = ">=1.16 <1.21.2"
deps.fabric_loader = "0.16.14"
deps.modmenu = "1.16.23"

# Modern 1.21 line: Music is a record (maxDelay) and SoundManager.pause() is gone. Has the screen.
["1.21.11"]
mod.mc_compat = ">=1.21.2 <1.22"
deps.fabric_loader = "0.17.2"
deps.modmenu = "16.0.0"

["26.1"]
mod.mc_compat = "~26.1"
deps.fabric_loader = "0.19.2"
# 26.1 is unobfuscated: only a Mod Menu build compiled against official 26.1 mappings will work.
deps.modmenu = "18.0.0-beta.1"
